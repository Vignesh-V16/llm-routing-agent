# Local Development Profile
# -------------------------

# Logging
logging.level.com.llmrouting.agent=DEBUG
logging.level.org.springframework.web=INFO

# Caching Thresholds (Relaxed for easier local testing)
routing.cache.similarity-threshold=0.70

# Threading (Fail-fast locally)
routing.async.timeout-seconds=2

# Webhook Endpoint (Mocked/Local)
routing.integration.webhook-url=http://localhost:5678/webhook/routing-telemetry

# Mock API Key for local
routing.security.api-key=dev-secret-key-123
