spring.application.name=llm-routing-agent
server.port=${PORT:8080}

spring.profiles.active=dev

# Classification Settings
routing.classification.prompt-template=You are an expert query classifier.\nClassify the following user query into exactly one of these intents:\n'coding', 'reasoning', 'summarization', 'general', 'explanation', 'realtime', 'search'\n\nAssess the complexity as:\n'low', 'medium', 'high'\n\nDetermine if answering the query requires real-time knowledge (boolean).\nOutput ONLY a valid JSON object matching this structure:\n{\n  "intent": "<intent>",\n  "complexity": "<complexity>",\n  "requiresRealTime": <true/false>,\n  "confidenceScore": <0.0-1.0>\n}\n\nQuery: "%s"

# Scoring Engine Weights (Must sum to roughly 1.0)
routing.scoring.weight.intent=0.4
routing.scoring.weight.complexity=0.3
routing.scoring.weight.latency=0.1
routing.scoring.weight.cost=0.1
routing.scoring.weight.memory=0.1

# Fallbacks & Penalties
routing.scoring.penalty.non-realtime=0.1
routing.scoring.threshold.minimum=0.5

# Thread Pool Sizing (Agnostic)
routing.async.core-pool-size=10
routing.async.max-pool-size=50
routing.async.queue-capacity=100
# Provider Endpoints
routing.api.openai.url=https://api.openai.com/v1/chat/completions
routing.api.gemini.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent
routing.api.claude.url=https://api.anthropic.com/v1/messages

# Actuator Health Checks & Metrics (Deployment)
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always

# Container Lifecycle
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# Resilience4j Circuit Breaker & Retry Configuration
resilience4j.circuitbreaker.configs.default.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3

resilience4j.circuitbreaker.instances.CHATGPT.base-config=default
resilience4j.circuitbreaker.instances.CLAUDE.base-config=default
resilience4j.circuitbreaker.instances.GEMINI.base-config=default
resilience4j.circuitbreaker.instances.HUGGINGFACE.base-config=default

resilience4j.retry.configs.default.max-attempts=3
resilience4j.retry.configs.default.wait-duration=2s
resilience4j.retry.instances.CHATGPT.base-config=default
resilience4j.retry.instances.CLAUDE.base-config=default
resilience4j.retry.instances.GEMINI.base-config=default
resilience4j.retry.instances.HUGGINGFACE.base-config=default
