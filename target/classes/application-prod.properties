# Live Production Profile
# -------------------------

# Logging
logging.level.com.llmrouting.agent=INFO
logging.level.org.springframework.web=WARN

# Caching Thresholds (Strict for production accuracy)
routing.cache.similarity-threshold=0.95

# Threading (Resilient to internet jitter)
routing.async.timeout-seconds=10

# Webhook Endpoint (Internal Kubernetes/Docker resolving)
routing.integration.webhook-url=${N8N_WEBHOOK_URL:http://n8n.internal:5678/webhook/routing-telemetry}

# Security Key (Strictly from Environment Variable)
routing.security.api-key=${ROUTING_API_KEY}
