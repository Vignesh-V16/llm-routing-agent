# Staging Profile
# -------------------------

# Logging
logging.level.com.llmrouting.agent=INFO
logging.level.org.springframework.web=INFO

# Caching Thresholds (Strict, mimicking production closely)
routing.cache.similarity-threshold=0.95

# Threading (Resilient, mimicking production)
routing.async.timeout-seconds=8

# Webhook Endpoint (Staging environment resolving)
routing.integration.webhook-url=${N8N_WEBHOOK_URL:http://n8n-staging.internal:5678/webhook/routing-telemetry}

# Security Key (Strictly from Environment Variable)
routing.security.api-key=${ROUTING_API_KEY}
